<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>فصول</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Scheherazade+New:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0c13;
      --bg2:      #10111c;
      --surface:  #14162a;
      --border:   #1e2040;
      --gold:     #c9a84c;
      --gold-dim: #7a5f28;
      --text:     #d8d3c8;
      --text-dim: #7a7568;
      --white:    #f0ece4;
      --red:      #c0544a;
    }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Amiri', 'Scheherazade New', serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 2;
    }

    #stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      position: fixed;
      inset: 0;
      z-index: 200;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }

    #lock-screen.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .lock-moon {
      font-size: 3rem;
      margin-bottom: 1.5rem;
      animation: moonpulse 3s ease-in-out infinite;
    }

    @keyframes moonpulse {
      0%, 100% { filter: drop-shadow(0 0 8px rgba(201,168,76,0.4)); }
      50%       { filter: drop-shadow(0 0 24px rgba(201,168,76,0.8)); }
    }

    .lock-title {
      font-family: 'Scheherazade New', serif;
      font-size: 2rem;
      color: var(--white);
      margin-bottom: 0.4rem;
      text-align: center;
    }

    .lock-sub {
      font-size: 0.95rem;
      color: var(--text-dim);
      font-style: italic;
      margin-bottom: 2.5rem;
      text-align: center;
    }

    .lock-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 320px;
      padding: 0 1.5rem;
    }

    .lock-input {
      width: 100%;
      padding: 0.85rem 1.2rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--white);
      font-family: 'Amiri', serif;
      font-size: 1.1rem;
      text-align: center;
      letter-spacing: 0.15em;
      outline: none;
      transition: border-color 0.2s;
      direction: ltr;
    }

    .lock-input:focus {
      border-color: var(--gold-dim);
    }

    .lock-input.error {
      border-color: var(--red);
      animation: shake 0.35s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-8px); }
      60%      { transform: translateX(8px); }
    }

    .lock-btn {
      width: 100%;
      padding: 0.85rem;
      background: transparent;
      border: 1px solid var(--gold-dim);
      border-radius: 8px;
      color: var(--gold);
      font-family: 'Scheherazade New', serif;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }

    .lock-btn:hover {
      background: rgba(201,168,76,0.08);
      border-color: var(--gold);
    }

    .lock-error {
      font-size: 0.85rem;
      color: var(--red);
      min-height: 1.2em;
      text-align: center;
      font-style: italic;
    }

    .lock-hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 1rem;
      text-align: center;
      font-style: italic;
    }

    /* ── STORY PAGE ── */
    #story-page {
      position: relative;
      z-index: 2;
      opacity: 0;
      transition: opacity 1s ease 0.3s;
    }

    #story-page.visible {
      opacity: 1;
    }

    .moon-deco {
      position: fixed;
      top: 2.5rem;
      left: 3rem;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 38%, #f5e8c0, #c9a84c 60%, transparent 100%);
      box-shadow: 0 0 40px 10px rgba(201,168,76,0.18), 0 0 80px 20px rgba(201,168,76,0.07);
      z-index: 3;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease 0.6s;
    }

    .moon-deco.visible { opacity: 1; }

    .sidebar {
      position: fixed;
      top: 0;
      right: 0;
      width: 220px;
      height: 100vh;
      background: rgba(11,12,19,0.92);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-end;
      padding: 2rem 1.5rem;
      gap: 1rem;
      z-index: 100;
      backdrop-filter: blur(6px);
    }

    .sidebar-title {
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .nav-link {
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.2s;
      text-align: right;
    }

    .nav-link:hover { color: var(--gold); }

    .main {
      margin-right: 220px;
      padding: 4rem 5vw 8rem 5vw;
      max-width: 820px;
    }

    .hero {
      padding: 6rem 0 5rem;
      text-align: right;
    }

    .hero-label {
      font-size: 0.75rem;
      letter-spacing: 0.25em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .hero-title {
      font-family: 'Scheherazade New', serif;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      font-weight: 700;
      color: var(--white);
      line-height: 1.2;
      margin-bottom: 1.2rem;
    }

    .hero-title span { color: var(--gold); }

    .hero-sub {
      font-size: 1.05rem;
      color: var(--text-dim);
      font-style: italic;
    }

    .hero-rule {
      width: 60px;
      height: 1px;
      background: var(--gold-dim);
      margin: 2rem 0 0 auto;
    }

    .chapter {
      margin-bottom: 6rem;
      padding-top: 2rem;
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }

    .chapter.visible { opacity: 1; transform: none; }

    .chapter-number {
      font-family: 'Scheherazade New', serif;
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 0.5rem;
    }

    .chapter-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to left, var(--gold-dim), transparent);
      margin-bottom: 2rem;
    }

    .chapter-body {
      font-family: 'Amiri', serif;
      font-size: 1.18rem;
      line-height: 2.15;
      color: var(--text);
      text-align: justify;
    }

    .chapter-body p { margin-bottom: 1.4em; }

    .footer {
      text-align: center;
      padding: 3rem 0;
      color: var(--text-dim);
      font-size: 0.85rem;
      font-style: italic;
      border-top: 1px solid var(--border);
    }

    .footer-moon { font-size: 1.4rem; display: block; margin-bottom: 0.5rem; opacity: 0.5; }

    @media (max-width: 700px) {
      .sidebar { display: none; }
      .main { margin-right: 0; padding: 2rem 1.2rem 5rem; }
      .moon-deco { width: 48px; height: 48px; top: 1rem; left: 1rem; }
    }
  </style>
</head>
<body>

<canvas id="stars"></canvas>
<div class="moon-deco" id="moon-deco"></div>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <div class="lock-moon">🌙</div>
  <div class="lock-title">فصول من يومياتنا</div>
  <div class="lock-sub">ادخلي المفتاح عشان تفتحي القصص</div>
  <div class="lock-form">
    <input
      class="lock-input"
      id="key-input"
      type="password"
      placeholder="المفتاح ..."
      autocomplete="off"
      spellcheck="false"
    />
    <button class="lock-btn" id="unlock-btn">افتح</button>
    <div class="lock-error" id="lock-error"></div>
    <div class="lock-hint">مايفتح الا للجدير بيه</div>
  </div>
</div>

<!-- STORY PAGE (populated after decrypt) -->
<div id="story-page">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">الفصول</div>
    <div id="nav-links"></div>
  </nav>
  <main class="main">
    <div class="hero">
      <div class="hero-label">قصص</div>
      <h1 class="hero-title">فصول <span>من يومياتنا</span></h1>
      <p class="hero-sub">لأنّ في التفاصيل الصغيرة تكمن أجمل اللحظات</p>
      <div class="hero-rule"></div>
    </div>
    <div id="chapters-container"></div>
    <footer class="footer">
      <span class="footer-moon">🌙</span>
      كُتبت بكل صدق، وللي يستاهل بس ولحالوا
    </footer>
  </main>
</div>

// ── Stars ──
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }

function initStars() {
  stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2,
      speed: Math.random() * 0.004 + 0.001,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (const s of stars) {
    const alpha = 0.3 + 0.5 * Math.sin(s.phase + t * s.speed);
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(240,236,228,${alpha.toFixed(3)})`;
    ctx.fill();
  }
  requestAnimationFrame(drawStars);
}

resize(); initStars();
window.addEventListener('resize', () => { resize(); initStars(); });
requestAnimationFrame(drawStars);

// ── Helpers ──
function b64ToBytes(b64) {
  const bin = atob(b64);
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

// ── Decrypt ──
async function decrypt(password) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    'raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64ToBytes(PAYLOAD.salt), iterations: 100000, hash: 'SHA-256' },
    keyMaterial,
    { name: 'AES-GCM', length: 256 },
    false,
    ['decrypt']
  );

  const dataBytes = b64ToBytes(PAYLOAD.data);
  const tagBytes  = b64ToBytes(PAYLOAD.tag);
  const combined  = new Uint8Array(dataBytes.length + tagBytes.length);
  combined.set(dataBytes);
  combined.set(tagBytes, dataBytes.length);

  const plain = await crypto.subtle.decrypt(
    { name: 'AES-GCM', iv: b64ToBytes(PAYLOAD.iv) },
    key,
    combined
  );
  return new TextDecoder().decode(plain);
}

// ── Render chapters ──
function renderStory(plaintext) {
  const navMatch   = plaintext.match(/NAV_PLACEHOLDER:([\s\S]*?):END_NAV/);
  const secMatch   = plaintext.match(/SECTIONS_PLACEHOLDER:([\s\S]*?):END_SECTIONS/);
  if (!navMatch || !secMatch) throw new Error('parse error');

  document.getElementById('nav-links').innerHTML = navMatch[1];
  document.getElementById('chapters-container').innerHTML = secMatch[1];

  // Scroll reveal
  const chapters = document.querySelectorAll('.chapter');
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.08 });
  chapters.forEach(ch => observer.observe(ch));
}

// ── Unlock flow ──
const lockScreen = document.getElementById('lock-screen');
const storyPage  = document.getElementById('story-page');
const moonDeco   = document.getElementById('moon-deco');
const input      = document.getElementById('key-input');
const btn        = document.getElementById('unlock-btn');
const errEl      = document.getElementById('lock-error');

async function tryUnlock() {
  const pw = input.value.trim();
  if (!pw) return;

  btn.disabled = true;
  btn.textContent = '...';
  errEl.textContent = '';

  try {
    const plain = await decrypt(pw);
    renderStory(plain);
    lockScreen.classList.add('hidden');
    storyPage.classList.add('visible');
    moonDeco.classList.add('visible');
  } catch {
    input.classList.add('error');
    errEl.textContent = 'المفتاح غلط، حاولي مرة ثانية 🌙';
    setTimeout(() => input.classList.remove('error'), 400);
    btn.disabled = false;
    btn.textContent = 'افتحي 🌸';
    input.value = '';
    input.focus();
  }
}

btn.addEventListener('click', tryUnlock);
input.addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
</script>
